<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict Molecular Weight</title>
</head>
<body>
    <h1>Predict Molecular Weight (CNN + GNN)</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post">
        <label for="smiles">SMILES string:</label><br>
        <input type="text" id="smiles" name="smiles" placeholder="e.g. CCO" required><br><br>

        <label for="ir_spectrum">IR spectrum (comma-separated, binned to the model's expected length):</label><br>
        <textarea id="ir_spectrum" name="ir_spectrum" rows="6" cols="60"
                  placeholder="0.01, 0.02, 0.15, ..." required></textarea><br><br>

        <button type="submit">Predict</button>
    </form>

    {% if error %}
        <p style="color: #b00020;"><strong>Error:</strong> {{ error }}</p>
    {% endif %}

    {% if results is not none %}
        <h2>Predicted molecular weight: {{ "%.2f"|format(results) }} g/mol</h2>
    {% endif %}
</body>
</html>
