name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install black flake8

      - name: Check formatting (black)
        run: black --check --diff src app.py wsgi.py tests notebook

      - name: Lint (flake8)
        run: flake8 src app.py wsgi.py tests notebook

      - name: Run tests
        run: pytest -v
